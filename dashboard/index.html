
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Leads</title>
<style>
body{font-family:sans-serif;background:#111;color:white;padding:20px}
.card{background:#1e1e1e;padding:15px;margin-bottom:10px;border-radius:8px}
</style>
</head>
<body>

<h2>Leads</h2>
<div id="list"></div>

<script>
async function load(){
const res=await fetch('http://localhost:3000/leads');
const data=await res.json();
const list=document.getElementById('list');
list.innerHTML='';
data.forEach(l=>{
list.innerHTML+=`<div class="card">
<b>${l.nome}</b><br>${l.email}<br>${l.mensagem}
</div>`;
});
}
load();
</script>

</body>
</html>
