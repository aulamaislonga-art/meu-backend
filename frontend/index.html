<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form SaaS</title>
    <style>
        :root {
            --navy: #0a0f1e;
            --navy2: #0f1830;
            --gold: #c8882a;
            --gold2: #e8a83a;
            --cream: #f7f0e3;
            --white: #ffffff;
            --muted: #8a94a6;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: var(--cream);
            overflow-x: hidden;
            font-weight: 400;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: .35;
        }

        input, select, textarea {
            width: 100%;
            border: none;
            margin: 8px 0;
            padding: 10px;
            border-radius: 6px;
        }

        .cta-section {
            padding: 4rem 1.25rem;
            position: relative;
            z-index: 1;
        }

        .forms-grid {
            max-width: 1180px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1.5rem;
            align-items: start;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
        }

        .form-row {
            display: flex;
        }

        .form-field {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 6px;
            padding: .9rem 1.2rem;
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            color: var(--cream);
            width: 100%;
            outline: none;
            transition: border-color .2s;
        }

        .form-field:focus {
            border-color: rgba(200, 136, 42, .5);
        }

        .form-field::placeholder {
            color: rgba(247, 240, 227, .45);
        }

        select.form-field option {
            background: var(--navy2);
        }

        .item {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .9rem;
        }

        .form-note {
            font-size: .78rem;
            margin-top: .5rem;
            text-align: center;
            color: var(--muted);
        }

        .form-card {
            display: flex;
            width: 100%;
            padding: 2rem;
            border-radius: 12px;
            flex-direction: column;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(255, 255, 255, .08);
        }

        .form-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            color: var(--white);
            margin-bottom: .5rem;
        }

        .form-card p {
            font-size: .92rem;
            color: rgba(247, 240, 227, .65);
            line-height: 1.6;
            margin-bottom: 1.4rem;
        }

        .btn-primary {
            width: 100%;
            border: none;
            margin: 10px 0;
            cursor: pointer;
            font-weight: 700;
            font-size: .95rem;
            color: var(--navy);
            border-radius: 4px;
            padding: 1rem 2.5rem;
            text-decoration: none;
            display: inline-block;
            letter-spacing: .05em;
            text-transform: uppercase;
            transition: transform .2s, box-shadow .2s;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(200, 136, 42, .4);
        }

        .btn-primary:disabled {
            cursor: not-allowed;
            opacity: .75;
            transform: none;
            box-shadow: none;
        }

        .form-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: .9rem;
            display: none;
        }

        @media (max-width: 900px) {
            .forms-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .item {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <section class="cta-section" id="contato">
        <div class="forms-grid">
            <div class="form-card">
                <h3>Patrocínios e Contrapartidas</h3>
                <p>Empresas e instituições que tenham interesse em apoiar o projeto.</p>

                <form id="patrocinio-form" class="contact-form">
                    <div class="item">
                        <div class="form-row">
                            <input name="nome" placeholder="Nome" required class="form-field">
                        </div>
                        <div class="form-row">
                            <input name="email" placeholder="E-mail corporativo" required type="email" class="form-field">
                        </div>
                    </div>
                    <div class="item">
                        <div class="form-row">
                            <input name="empresa" placeholder="Empresa / Instituição" required type="text" class="form-field">
                        </div>
                        <div class="form-row">
                            <input name="telefone" placeholder="WhatsApp / Telefone" type="tel" class="form-field">
                        </div>
                    </div>
                    <div class="form-row">
                        <select name="categoria" required class="form-field">
                            <option disabled selected value="">Selecione uma categoria de parceria de interesse</option>
                            <option>Patrocínio Master (R$ 300.000 – 500.000)</option>
                            <option>Patrocínio Oficial (R$ 100.000)</option>
                            <option>Parceiro Estratégico (R$ 80.000 + Equipamentos)</option>
                            <option>Colaboração Institucional (R$ 50.000)</option>
                            <option>Suporte Estratégico (R$ 20.000 + Vaga de Estágio)</option>
                            <option>Apoio (R$ 12.000)</option>
                            <option>Participação (R$ 5.000)</option>
                            <option>Outro / Quero Conversar</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <textarea name="mensagem" placeholder="Mensagem ou interesse específico (opcional)" rows="3" style="resize: vertical;" class="form-field"></textarea>
                    </div>
                    <div class="form-row" style="display:none;">
                        <input name="website" autocomplete="off" tabindex="-1">
                    </div>
                    <div class="form-row">
                        <button class="btn-primary" type="submit">Enviar</button>
                    </div>
                    <div class="form-message" aria-live="polite"></div>
                    <p class="form-note">Ao enviar, seu interesse será registrado por e-mail.</p>
                </form>
            </div>

            <div class="form-card">
                <h3>Quero assistir essa aula!</h3>
                <p>Preencha com seus dados e garanta sua vaga.</p>
                <form id="inscricao-form" class="contact-form">
                    <div class="form-row">
                        <select class="form-field" name="modalidade" required>
                            <option disabled selected value="">Como você deseja assistir?</option>
                            <option>Presencial - Três de Maio/RS</option>
                            <option>Online Guinness</option>
                            <option>Online Simples</option>
                        </select>
                    </div>
                    <div class="item">
                        <div class="form-row">
                            <input class="form-field" name="nome" placeholder="Nome" required type="text">
                        </div>
                        <div class="form-row">
                            <input class="form-field" name="sobrenome" placeholder="Sobrenome" required type="text">
                        </div>
                    </div>
                    <div class="item">
                        <div class="form-row">
                            <input class="form-field" name="email" placeholder="E-mail" required type="email">
                        </div>
                        <div class="form-row">
                            <input class="form-field" name="whatsapp" placeholder="WhatsApp" required type="tel">
                        </div>
                    </div>
                    <div class="form-row">
                        <textarea class="form-field" name="mensagem" placeholder="Mensagem opcional" rows="3" style="resize: vertical;"></textarea>
                    </div>
                    <div class="form-row" style="display:none;">
                        <input name="website" autocomplete="off" tabindex="-1">
                    </div>
                    <div class="form-row">
                        <button class="btn-primary" type="submit">Inscreva-se</button>
                    </div>
                    <div class="form-message" aria-live="polite"></div>
                    <p class="form-note">Ao enviar, sua inscrição será registrada por e-mail.</p>
                </form>
            </div>
        </div>
    </section>

    <script>
        const endpoint = 'https://aulamaislonga.onrender.com/send';

        function setFormMessage(form, msg, success = true) {
            const el = form.querySelector('.form-message');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.background = success ? '#16a34a' : '#dc2626';
            el.style.color = '#ffffff';
        }

        function bindForm({ formId, loadingText, idleText, successMessage, buildPayload }) {
            const form = document.getElementById(formId);
            if (!form) return;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const btn = form.querySelector('button[type="submit"]');
                btn.textContent = loadingText;
                btn.disabled = true;

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(buildPayload(form))
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.error || 'Erro ao enviar');
                    }

                    setFormMessage(form, successMessage, true);
                    form.reset();
                } catch (error) {
                                        setFormMessage(form, `❌ ${error.message || 'Erro ao enviar. Tente novamente.'}`, false);
                } finally {
                    btn.textContent = idleText;
                    btn.disabled = false;
                }
            });
        }

        bindForm({
            formId: 'patrocinio-form',
            loadingText: '⏳ Enviando...',
            idleText: 'Enviar',
            successMessage: '✅ Mensagem enviada com sucesso!',
            buildPayload: (form) => ({
                tipo: 'patrocinio',
                nome: form.nome.value,
                email: form.email.value,
                empresa: form.empresa.value,
                telefone: form.telefone.value,
                categoria: form.categoria.value,
                mensagem: form.mensagem.value,
                website: form.website.value
            })
        });

        bindForm({
            formId: 'inscricao-form',
            loadingText: '⏳ Enviando...',
            idleText: 'Inscreva-se',
            successMessage: '✅ Inscrição enviada com sucesso!',
            buildPayload: (form) => ({
                tipo: 'inscricao',
                modalidade: form.modalidade.value,
                nome: form.nome.value,
                sobrenome: form.sobrenome.value,
                email: form.email.value,
                whatsapp: form.whatsapp.value,
                mensagem: form.mensagem.value,
                website: form.website.value
            })
        });
    </script>
</body>
</html>
